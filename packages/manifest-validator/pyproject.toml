[project]
name = "lifeofpy-manifest-validator"
version = "0.1.0"
description = "Strict Pydantic schemas for LifeOfPy manifests"
requires-python = ">=3.10"
dependencies = [
    "pydantic>=2.0.0"
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/manifest_validator"]
